<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Espera · Olimpiadas Matemáticas</title>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
    <link rel="stylesheet" href="../css/main.css">
    <script src="../js/theme.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .school-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.25);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--orange);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            gap: 2.5rem;
            text-align: center;
        }

        .waiting-status {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .waiting-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--orange);
            opacity: 0.3;
            animation: dot-pulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dot-pulse {

            0%,
            80%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            40% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        /* Cards strip */
        .cards-section {
            width: 100%;
            max-width: 700px;
        }

        .cards-section h4 {
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
        }

        .cards-strip {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Face-down activity card */
        .activity-card-down {
            width: 110px;
            height: 150px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, #1e1e40 0%, #2a2a5a 100%);
            border: 2px solid rgba(99, 102, 241, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            cursor: default;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            animation: card-float 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .activity-card-down::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(-45deg, transparent 0px, transparent 8px,
                    rgba(255, 255, 255, 0.02) 8px, rgba(255, 255, 255, 0.02) 9px);
        }

        .activity-card-down:nth-child(2) {
            animation-delay: 0.4s;
        }

        .activity-card-down:nth-child(3) {
            animation-delay: 0.8s;
        }

        .activity-card-down:nth-child(4) {
            animation-delay: 1.2s;
        }

        .activity-card-down:nth-child(5) {
            animation-delay: 1.6s;
        }

        @keyframes card-float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .card-icon {
            font-size: 2rem;
            opacity: 0.4;
        }

        .card-num {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
        }

        .no-cards-msg {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>

    <header class="header">
        <div class="flex items-center gap-2" style="font-family:var(--font-head);font-weight:800;font-size:1rem">
            <i class="hgi-stroke hgi-trophy"></i> Olimpiadas
        </div>
        <div class="flex items-center gap-2">
            <div class="school-chip">
                <i class="hgi-stroke hgi-school"></i> <span id="school-name">Colegio</span>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema"
                style="position: relative; top: 0; right: 0; width: 36px; height: 36px; font-size: 1.2rem;">
                <span class="icon-sun"><i class="hgi-stroke hgi-sun-03"></i></span>
                <span class="icon-moon" style="display: none;"><i class="hgi-stroke hgi-moon-02"></i></span>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="waiting-status">
            <h2>¡Bienvenido a la <span class="text-gradient">Olimpiada!</span></h2>
            <p style="max-width:360px;margin:0 auto">Estás en la sala de espera. El profesor iniciará la sesión en unos
                momentos.</p>
            <div class="waiting-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="cards-section">
            <h4>TUS ACTIVIDADES (boca abajo)</h4>
            <div class="cards-strip" id="cards-strip">
                <p class="no-cards-msg">El profesor aún no ha asignado actividades…</p>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/session-manager.js"></script>
    <script>
        const sessionId = localStorage.getItem('studentSessionId');
        const studentUid = localStorage.getItem('studentUid');
        const schoolName = localStorage.getItem('studentSchool') || 'Mi Colegio';

        if (!sessionId || !studentUid) {
            window.location.href = 'join.html';
        }

        document.getElementById('school-name').textContent = schoolName;

        function renderCards(count) {
            const strip = document.getElementById('cards-strip');
            if (!count) {
                strip.innerHTML = '<p class="no-cards-msg">El profesor aún no ha asignado actividades…</p>';
                return;
            }
            strip.innerHTML = Array.from({ length: count }, (_, i) => `
        <div class="activity-card-down">
          <div class="card-icon"><i class="hgi-stroke hgi-lock-02"></i></div>
          <div class="card-num">Ej. ${i + 1}</div>
        </div>`).join('');
        }

        // Listen to session state
        dbListen(`sessions/${sessionId}`, (data) => {
            if (!data) return;
            const count = data.assignedActivities ? data.assignedActivities.length : 0;
            renderCards(count);

            if (data.status === 'active') {
                window.location.href = 'exercise.html';
            }
            if (data.status === 'finished') {
                window.location.href = 'locked.html';
            }
        });

        // Re-mark connected
        async function init() {
            const user = await waitForAuth() || await signInAnonymously();
            await dbSet(`sessions/${sessionId}/students/${studentUid}/connected`, true);
            db.ref(`sessions/${sessionId}/students/${studentUid}/connected`).onDisconnect().set(false);
        }
        init();
    </script>
    <script src="../js/matrix-bg.js"></script>
</body>

</html>
