<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Actividades · Olimpiadas Matemáticas</title>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
    <link rel="stylesheet" href="../css/main.css">
    <script src="../js/theme.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar .brand {
            font-family: var(--font-head);
            font-weight: 800;
        }

        .main {
            flex: 1;
            padding: 2rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h2 {
            margin-bottom: 0.5rem;
        }

        .selection-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            background: rgba(249, 115, 22, 0.12);
            border: 1px solid rgba(249, 115, 22, 0.3);
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--orange);
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.4rem 1rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all var(--transition);
        }

        .filter-btn.active {
            border-color: var(--orange);
            color: var(--orange);
            background: rgba(249, 115, 22, 0.1);
        }

        /* Cards grid */
        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        /* Activity card */
        .activity-card {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            border: 2px solid var(--border);
            background: var(--bg-card);
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            user-select: none;
        }

        .activity-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .activity-card.selected {
            border-color: var(--orange);
            background: rgba(249, 115, 22, 0.1);
            box-shadow: 0 0 20px var(--orange-glow);
        }

        .activity-card.selected .check-badge {
            opacity: 1;
            transform: scale(1);
        }

        .check-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--orange);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #fff;
            font-weight: 700;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s var(--ease);
        }

        .activity-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            width: fit-content;
        }

        .type-a {
            background: rgba(99, 102, 241, 0.15);
            color: var(--blue);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .type-b {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .activity-title {
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.3;
        }

        .activity-preview {
            font-size: 0.8rem;
            color: var(--text-muted);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .activity-points {
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: 600;
        }

        /* Selection count pill */
        .selection-counter {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--orange);
            border-radius: 999px;
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--orange);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 30px var(--orange-glow);
            transition: opacity var(--transition);
            pointer-events: none;
        }

        /* Bottom bar */
        .bottom-bar {
            padding: 1.25rem 2rem;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>

    <header class="top-bar">
        <div class="brand"><i class="hgi-stroke hgi-book-open-01"></i> Banco de Actividades</div>
        <div class="flex items-center gap-2">
            <span class="selection-badge">
                <span id="sel-count">0</span>/5 seleccionadas
            </span>
            <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema"
                style="position: relative; top: 0; right: 0; width: 36px; height: 36px; font-size: 1.2rem; margin-left: 0.5rem;">
                <span class="icon-sun"><i class="hgi-stroke hgi-sun-03"></i></span>
                <span class="icon-moon" style="display: none;"><i class="hgi-stroke hgi-moon-02"></i></span>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="page-header">
            <h2>Selecciona 5 actividades</h2>
            <p>Elige exactamente 5 ejercicios del banco. Los estudiantes las recibirán como tarjetas boca abajo.</p>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-type="all">Todos</button>
            <button class="filter-btn" data-type="G1">Grupo 1</button>
            <button class="filter-btn" data-type="G2">Grupo 2</button>
            <button class="filter-btn" data-type="G3">Grupo 3</button>
            <button class="filter-btn" data-type="G4">Grupo 4</button>
            <button class="filter-btn" data-type="B">Tipo B — Tangram</button>
        </div>

        <div class="activities-grid" id="activities-grid">
            <!-- Populated by JS -->
        </div>
    </main>

    <div class="selection-counter" id="selection-counter">0 de 5 seleccionadas</div>

    <footer class="bottom-bar">
        <p style="font-size:0.875rem;color:var(--text-muted)">Selecciona exactamente 5 actividades para continuar</p>
        <div class="flex gap-2">
            <a href="lobby.html" class="btn btn-secondary">Cancelar</a>
            <button id="btn-confirm" class="btn btn-primary btn-lg" disabled>
                <i class="hgi-stroke hgi-tick-02"></i> Confirmar selección
            </button>
        </div>
    </footer>

    <div id="toast-container"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/session-manager.js"></script>
    <script>
        let activities = [];
        let selected = new Set();
        let sessionId = localStorage.getItem('hostBankSessionId') || localStorage.getItem('hostSessionId');
        let filterType = 'all';

        // ── Load activities ──────────────────────────────────────
        async function loadActivities() {
            const res = await fetch('../data/activities.json');
            activities = await res.json();
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('activities-grid');
            const list = filterType === 'all'
                ? activities
                : filterType.startsWith('G')
                    ? activities.filter(a => a.type === 'A' && a.group == filterType.replace('G', ''))
                    : activities.filter(a => a.type === filterType);

            grid.innerHTML = list.map((act, i) => {
                const realIdx = activities.indexOf(act);
                const isSel = selected.has(realIdx);
                const selOrder = isSel ? [...selected].indexOf(realIdx) + 1 : '';
                return `
          <div class="activity-card ${isSel ? 'selected' : ''}"
               data-idx="${realIdx}" onclick="toggleCard(${realIdx})">
            <div class="check-badge">${selOrder}</div>
            <span class="activity-type-badge ${act.type === 'B' ? 'type-b' : 'type-a'}">
              ${act.type === 'B' ? '<i class="hgi-stroke hgi-puzzle"></i> Tangram' : '<i class="hgi-stroke hgi-math"></i> Tipo A'}
            </span>
            <div class="activity-title">${escHtml(act.title)}</div>
            <div class="activity-preview">${escHtml(act.question || '')}</div>
            <div class="activity-points"><i class="hgi-stroke hgi-star"></i> ${act.maxPoints || 2} puntos</div>
          </div>`;
            }).join('');
        }

        function toggleCard(idx) {
            if (selected.has(idx)) {
                selected.delete(idx);
            } else {
                if (selected.size >= 5) {
                    showToast('Solo puedes seleccionar 5 actividades', 'error');
                    return;
                }
                selected.add(idx);
            }
            updateUI();
            renderGrid();
        }

        function updateUI() {
            const n = selected.size;
            document.getElementById('sel-count').textContent = n;
            document.getElementById('selection-counter').textContent = `${n} de 5 seleccionadas`;
            document.getElementById('btn-confirm').disabled = n !== 5;
        }

        // ── Filters ──────────────────────────────────────────────
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterType = btn.dataset.type;
                renderGrid();
            });
        });

        // ── Confirm ──────────────────────────────────────────────
        document.getElementById('btn-confirm').addEventListener('click', async () => {
            if (selected.size !== 5) return;
            const btn = document.getElementById('btn-confirm');
            btn.disabled = true; btn.textContent = 'Guardando…';
            try {
                const indices = [...selected];
                await assignActivities(sessionId, indices);
                showToast('Actividades asignadas correctamente', 'success');
                setTimeout(() => window.location.href = 'lobby.html', 800);
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false; btn.innerHTML = '<i class="hgi-stroke hgi-tick-02"></i> Confirmar selección';
            }
        });

        function escHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Init
        waitForAuth().then(u => u || signInAnonymously()).then(loadActivities);
    </script>
    <script src="../js/matrix-bg.js"></script>
</body>

</html>
